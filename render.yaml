databases:
  - name: study-sprint-db
    plan: free
    databaseName: study_sprint
    user: study_sprint

services:
  - type: web
    name: study-sprint-api
    env: node
    plan: free
    rootDir: StudySprint/backend
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: study-sprint-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false

  - type: web
    name: study-sprint-web
    env: static
    rootDir: StudySprint
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
